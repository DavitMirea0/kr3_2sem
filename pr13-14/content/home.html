<div class="card">
  <div class="section-title">Добавить заметку</div>
  <form class="form" id="note-form">
    <input type="text" id="note-input" placeholder="Введите заметку..." required autocomplete="off">
    <button type="submit">Добавить</button>
  </form>

  <div class="section-title">Добавить с напоминанием</div>
  <form class="form" id="reminder-form" style="flex-wrap:wrap;">
    <input type="text" id="reminder-text" placeholder="Текст напоминания" required autocomplete="off" style="flex:2;min-width:140px;">
    <input type="datetime-local" id="reminder-time" required style="flex:1;min-width:140px;padding:.6rem .8rem;border:1px solid #2a2d3a;border-radius:8px;background:#12141c;color:#e2e4e9;font-size:.85rem;outline:none;">
    <button type="submit" style="background:#059669;">Напомнить</button>
  </form>

  <div class="section-title">Быстрое напоминание</div>
  <form class="form" id="quick-reminder-form" style="flex-wrap:wrap;">
    <input type="text" id="quick-text" placeholder="Текст" required autocomplete="off" style="flex:2;min-width:140px;">
    <input type="number" id="quick-minutes" placeholder="Мин" min="1" max="1440" value="5" required style="width:70px;padding:.6rem .5rem;border:1px solid #2a2d3a;border-radius:8px;background:#12141c;color:#e2e4e9;font-size:.85rem;outline:none;text-align:center;">
    <button type="submit" style="background:#7c3aed;">Через N мин</button>
  </form>

  <div class="section-title" style="margin-top:1rem;">Список заметок</div>
  <ul class="notes" id="notes-list"></ul>
  <div class="empty" id="empty-state" style="display:none;">Заметок пока нет. Добавьте первую!</div>
</div>
