<div class="card">
  <form class="form" id="note-form">
    <input type="text" id="note-input" placeholder="Введите заметку..." required autocomplete="off">
    <button type="submit">Добавить</button>
  </form>
  <ul class="notes" id="notes-list"></ul>
  <div class="empty" id="empty-state" style="display:none;">Заметок пока нет. Добавьте первую!</div>
</div>
<div class="push-row">
  <button id="enable-push" class="btn-on">Включить уведомления</button>
  <button id="disable-push" class="btn-off" style="display:none;">Отключить уведомления</button>
</div>
