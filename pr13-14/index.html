<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="/icons/favicon-256x256.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/x-icon">
  <title>SoftShop — Заметки</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1>SoftShop — Заметки</h1>
    <p>Офлайн-приложение с Service Worker</p>
  </div>

  <div id="connection-status" class="status status--online">
    <span class="status__dot"></span>
    <span>Онлайн</span>
  </div>

  <div class="tabs">
    <button id="home-btn" class="tab active">Главная</button>
    <button id="about-btn" class="tab">О приложении</button>
  </div>

  <main id="app-content"></main>

  <div class="push-row">
    <button id="enable-push" class="btn-on">Включить уведомления</button>
    <button id="disable-push" class="btn-off" style="display:none;">Отключить уведомления</button>
  </div>

  <div class="sw-info" id="sw-info"></div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
