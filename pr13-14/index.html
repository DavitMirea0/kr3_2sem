<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftShop — Заметки</title>
  <!-- Web App Manifest -->
  <link rel="manifest" href="/manifest.json">
  <!-- Для Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <!-- Цвет темы для браузера -->
  <meta name="theme-color" content="#6366f1">
  <!-- Для iOS (иконка на домашний экран) -->
  <link rel="apple-touch-icon" href="/icons/favicon-256x256.png">
  <!-- Для iOS (статус бар) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Favicon -->
  <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e4e9;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
    .header{text-align:center;margin-bottom:2rem}
    .header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .header p{color:#9ca3af;font-size:.9rem;margin-top:.3rem}
    .status{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .8rem;border-radius:999px;font-size:.78rem;font-weight:600;margin-bottom:1.5rem}
    .status--online{background:#065f4620;color:#34d399;border:1px solid #34d39940}
    .status--offline{background:#7f1d1d20;color:#f87171;border:1px solid #f8717140}
    .status__dot{width:8px;height:8px;border-radius:50%}
    .status--online .status__dot{background:#34d399}
    .status--offline .status__dot{background:#f87171}
    .card{width:100%;max-width:540px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:12px;padding:1.5rem}
    .form{display:flex;gap:.5rem;margin-bottom:1.2rem}
    .form input{flex:1;padding:.65rem .9rem;border:1px solid #2a2d3a;border-radius:8px;background:#12141c;color:#e2e4e9;font-size:.9rem;outline:none}
    .form input:focus{border-color:#6366f1}
    .form input::placeholder{color:#555a6e}
    .form button{padding:.65rem 1.2rem;border:none;border-radius:8px;background:#6366f1;color:#fff;font-size:.9rem;font-weight:600;cursor:pointer}
    .form button:hover{background:#4f46e5}
    .notes{list-style:none}
    .notes li{display:flex;align-items:center;justify-content:space-between;padding:.7rem 0;border-bottom:1px solid #2a2d3a}
    .notes li:last-child{border-bottom:none}
    .notes li .text{flex:1;font-size:.92rem;word-break:break-word}
    .notes li .delete-btn{background:none;border:none;color:#f87171;font-size:1rem;cursor:pointer;padding:.2rem .5rem;border-radius:6px;margin-left:.5rem}
    .notes li .delete-btn:hover{background:#7f1d1d30}
    .empty{text-align:center;color:#555a6e;padding:2rem 0 1rem;font-size:.9rem}
    .sw-info{margin-top:1.5rem;font-size:.75rem;color:#555a6e;text-align:center}
  </style>
</head>
<body>
  <div class="header">
    <h1>SoftShop — Заметки</h1>
    <p>Офлайн-приложение с Service Worker</p>
  </div>
  <div class="status" id="status">
    <span class="status__dot"></span>
    <span id="status-text">...</span>
  </div>
  <div class="card">
    <form class="form" id="note-form">
      <input type="text" id="note-input" placeholder="Введите заметку..." required autocomplete="off">
      <button type="submit">Добавить</button>
    </form>
    <ul class="notes" id="notes-list"></ul>
    <div class="empty" id="empty-state" style="display:none;">Заметок пока нет. Добавьте первую!</div>
  </div>
  <div class="sw-info" id="sw-info"></div>
  <script src="app.js"></script>
</body>
</html>
